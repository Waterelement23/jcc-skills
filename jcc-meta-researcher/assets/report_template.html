<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{title}</title>
  <style>
    * {{ box-sizing: border-box; }}
    body {{
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #100a22;
      color: #f4edf8;
    }}
    .report {{ max-width: 1280px; margin: 0 auto; display: grid; gap: 22px; }}
    .jcc-shell {{
      color:#f4edf8;
      background: radial-gradient(circle at 70% 30%, rgba(174,78,180,.42), transparent 38%), linear-gradient(135deg,#1c123f 0%,#30184f 48%,#9b3a7f 100%);
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 22px 70px rgba(0,0,0,.35);
    }}
    .jcc-topbar {{ display:flex; justify-content:space-between; align-items:center; padding:18px 26px 12px; gap: 16px; }}
    .brand {{ display:flex; align-items:center; gap:12px; font-size:25px; font-weight:900; color:#f5df8e; letter-spacing:0; }}
    .brand-mark {{ width:28px; height:28px; clip-path:polygon(100% 0,24% 50%,100% 100%,72% 100%,0 50%,72% 0); background:#f5df8e; box-shadow:0 0 12px rgba(245,223,142,.45); }}
    .stage-pill {{ color:#fff6bd; background:rgba(18,9,39,.72); border:1px solid rgba(255,255,255,.1); border-radius:18px; padding:8px 14px; font-size:14px; font-weight:850; text-shadow:0 0 10px rgba(255,238,157,.32); white-space: nowrap; }}
    .jcc-main {{ display:grid; grid-template-columns:minmax(620px,1fr) 340px; min-height:500px; }}
    .left-area {{ padding:20px 26px 26px; border-right:1px solid rgba(255,255,255,.14); overflow-x:auto; }}
    .right-area {{ padding:20px 26px; background:linear-gradient(180deg,rgba(32,16,64,.22),rgba(255,255,255,.02)); display:flex; flex-direction:column; }}
    .board-stage {{ position:relative; height:365px; border-radius:16px; background: radial-gradient(circle at 50% 42%, rgba(255,255,255,.08), transparent 50%), linear-gradient(180deg,rgba(24,13,48,.5),rgba(24,13,48,.15)); overflow:visible; }}
    .board-grid {{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:604px; height:312px; opacity:1; }}
    .grid-row {{ display:flex; justify-content:center; gap:16px; margin-top:12px; }}
    .grid-row:first-child {{ margin-top:0; }}
    .grid-row.offset {{ transform:translateX(39px); }}
    .grid-hex {{ position:relative; width:68px; height:58px; background:transparent; border:0; overflow:visible; }}
    .grid-hex::before {{ content:""; position:absolute; inset:0; clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%); background:rgba(13,9,29,.42); border:1px solid rgba(255,255,255,.07); }}
    .grid-hex:has(.unit-card)::before {{ background:rgba(255,255,255,.035); border-color:rgba(255,255,255,.12); }}
    .unit-card {{ position:relative; width:58px; height:62px; left:50%; top:50%; transform:translate(-50%,-50%); text-align:center; z-index:3; }}
    .stars {{ position:absolute; top:-11px; left:0; right:0; height:13px; color:#ffd348; font-size:11px; letter-spacing:-1px; text-shadow:0 1px 4px rgba(0,0,0,.8); z-index:3; }}
    .avatar-frame {{ position:relative; width:52px; height:52px; margin:0 auto; clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%); background:linear-gradient(135deg,#16c784,#1d4ed8); padding:4px; box-shadow:0 5px 16px rgba(0,0,0,.55),0 0 14px rgba(78,205,196,.28); }}
    .avatar-frame.carry {{ background:linear-gradient(135deg,#ffb347,#d946ef); }}
    .avatar-frame.tank {{ background:linear-gradient(135deg,#7dd36f,#0f766e); }}
    .avatar-frame.utility {{ background:linear-gradient(135deg,#93a4bd,#475569); }}
    .avatar {{ width:100%; height:100%; object-fit:cover; clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%); display:block; background:#1f2937; }}
    .captain {{ position:absolute; right:4px; top:6px; width:18px; height:18px; clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%); background:#f3d078; color:#4a2d0e; font-size:10px; font-weight:900; line-height:18px; z-index:4; filter:drop-shadow(0 1px 2px rgba(0,0,0,.65)); }}
    .unit-items {{ position:absolute; left:50%; bottom:1px; transform:translateX(-50%); display:flex; gap:2px; z-index:5; }}
    .item {{ width:13px; height:13px; border-radius:3px; border:1px solid rgba(255,255,255,.68); box-shadow:0 2px 6px rgba(0,0,0,.6); background:#1b2430; object-fit:cover; }}
    .traits {{ display:flex; gap:18px; flex-wrap:wrap; align-items:center; margin:18px 0 16px; }}
    .trait {{ display:flex; align-items:center; gap:8px; min-width:105px; color:#d7cfe4; font-size:15px; font-weight:750; }}
    .trait-icon {{ width:28px; height:28px; clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%); background:linear-gradient(135deg,#f59e0b,#6b3f17); display:grid; place-items:center; color:#18111f; font-weight:900; }}
    .priority {{ display:flex; align-items:center; gap:14px; color:#f1e8f8; font-size:17px; margin-bottom:14px; }}
    .priority-items {{ display:flex; gap:12px; }}
    .priority .item {{ width:44px; height:44px; border-radius:4px; }}
    .visual-section {{ display:grid; grid-template-columns:86px 1fr; gap:12px; align-items:start; margin-top:10px; color:#f1e8f8; }}
    .visual-section-title {{ font-size:15px; font-weight:850; padding-top:7px; }}
    .icon-list {{ display:flex; gap:10px; flex-wrap:wrap; }}
    .icon-chip {{ display:grid; grid-template-columns:34px auto; gap:7px; align-items:center; min-height:38px; padding:5px 9px 5px 5px; border-radius:10px; background:rgba(18,9,39,.54); border:1px solid rgba(255,255,255,.1); }}
    .icon-chip img {{ width:34px; height:34px; border-radius:7px; border:1px solid rgba(255,255,255,.35); object-fit:cover; background:#1b1233; }}
    .icon-chip span {{ font-size:13px; color:#eadff1; font-weight:750; white-space:nowrap; }}
    .god-icon {{ width:34px; height:34px; clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%); display:grid; place-items:center; color:#fff3b8; font-size:15px; font-weight:900; background:radial-gradient(circle at 35% 25%,#fff3b8,#a979ff 38%,#2d1b63 82%); filter:drop-shadow(0 1px 5px rgba(0,0,0,.4)); }}
    .note-title {{ font-size:18px; font-weight:900; color:#fff; margin:8px 0 8px; border-left:3px solid #fff7bd; padding-left:9px; }}
    .note {{ color:#c8b7cf; font-size:15px; line-height:1.65; margin:0 0 18px; }}
    .radar-mini {{ margin-top:auto; display:block; background:rgba(18,9,39,.45); border:1px solid rgba(255,255,255,.09); border-radius:12px; padding:12px; }}
    .radar-chart {{ width:100%; max-width:300px; display:block; margin:0 auto; }}
    .radar-label {{ fill:#eadff1; font-size:10px; font-weight:700; }}
    .radar-score {{ fill:#fff4b8; font-size:9px; font-weight:800; }}
    @media (max-width: 980px) {{
      .jcc-main {{ grid-template-columns:1fr; }}
      .left-area {{ border-right:0; border-bottom:1px solid rgba(255,255,255,.14); }}
      .board-stage {{ height:330px; min-width:650px; }}
      .right-area {{ padding-top:10px; }}
    }}
    @media (max-width: 520px) {{
      body {{ padding: 12px; }}
      .jcc-topbar {{ padding:14px 16px 8px; }}
      .brand {{ font-size:20px; }}
      .stage-pill {{ font-size:12px; }}
      .left-area {{ padding:16px; }}
      .traits, .priority, .visual-section {{ min-width:650px; }}
    }}
  </style>
</head>
<body>
  <main class="report">
    {cards}
  </main>
</body>
</html>
